<!DOCTYPE html>
<html>
<head>
  <title>Missed Call Demo | Code 3 Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      text-align: center;
      padding: 30px 15px;
    }

    h1 {
      color: white;
      margin-bottom: 5px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    .phone {
      max-width: 380px;
      margin: auto;
      background: black;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    .notch {
      width: 120px;
      height: 25px;
      background: #111;
      border-radius: 20px;
      margin: 0 auto 10px;
    }

    .screen {
      background: #f1f5f9;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 520px;
    }

    .header {
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
      color: black;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      margin: 6px 0;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.4;
    }

    .bot {
      background: #e5e7eb;
      color: black;
      text-align: left;
    }

    .user {
      background: #2563eb;
      color: white;
      margin-left: auto;
    }

    .input-area {
      background: white;
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      padding: 10px 15px;
      margin-left: 5px;
      border: none;
      border-radius: 20px;
      background: #e11d48;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #be123c;
    }

    .options {
      margin-top: 10px;
    }

    .option-btn {
      display: block;
      width: 100%;
      margin-top: 5px;
      border-radius: 10px;
      background: #1f2937;
    }
  </style>
</head>

<body>

  <h1>Test the System</h1>
  <p>Experience what your customers see after a missed call.</p>

  <div class="phone">
    <div class="notch"></div>

    <div class="screen">

      <div class="header">
        Code 3 Leads
      </div>

      <div class="messages" id="chat"></div>

      <div class="input-area">
        <input id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>

        <div class="options" id="options">
          <button class="option-btn" onclick="selectOption(1)">1. Emergency</button>
          <button class="option-btn" onclick="selectOption(2)">2. Service Issue</button>
          <button class="option-btn" onclick="selectOption(3)">3. Quote / Estimate</button>
        </div>
      </div>

    </div>
  </div>

<script>
let step = 0;

window.onload = function() {
  addBotMessage("Hey! Sorry we missed your call.\n\nWhat can we help you with?\n\n1. Emergency\n2. Service Issue\n3. Quote/Estimate");
};

function addUserMessage(text){
  const chat = document.getElementById("chat");
  let msg = document.createElement("div");
  msg.className = "bubble user";
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addBotMessage(text){
  const chat = document.getElementById("chat");
  let msg = document.createElement("div");
  msg.className = "bubble bot";
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function selectOption(option){
  addUserMessage(option);
  document.getElementById("options").style.display = "none";

  setTimeout(() => {
    if(option == 1){
      addBotMessage("This looks urgent. What’s going on?");
    } else if(option == 2){
      addBotMessage("Got it. Can you describe the issue?");
    } else {
      addBotMessage("Sure — what type of work are you looking for?");
    }
    step = 1;
  }, 500);
}

function sendMessage(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  addUserMessage(text);
  input.value = "";

  setTimeout(() => {
    if(step === 1){
      addBotMessage("Perfect — we’ve sent this to the contractor.\n\n📲 They can call or text you directly shortly.");
      step = 2;
    } else {
      addBotMessage("A contractor will be in touch shortly.");
    }
  }, 500);
}
</script>

</body>
</html>
