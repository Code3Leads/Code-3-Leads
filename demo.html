<!DOCTYPE html>
<html>
<head>
  <title>Missed Call Demo | Code 3 Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      text-align: center;
      padding: 30px 15px;
      color: white;
    }

    h1 { margin-bottom: 5px; }
    p { color: #cbd5f5; margin-bottom: 20px; }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .phone {
      max-width: 350px;
      background: black;
      border-radius: 40px;
      padding: 12px;
    }

    .screen {
      background: #f1f5f9;
      border-radius: 30px;
      height: 500px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: white;
      color: black;
      padding: 10px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .bubble {
      padding: 10px;
      border-radius: 15px;
      margin: 5px 0;
      max-width: 75%;
    }

    .bot { background: #e5e7eb; color: black; }
    .user { background: #2563eb; color: white; margin-left: auto; }

    .input-area {
      background: white;
      padding: 10px;
    }

    input {
      width: 65%;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: #e11d48;
      color: white;
      cursor: pointer;
    }

    .options button {
      display: block;
      width: 100%;
      margin-top: 5px;
      background: #1f2937;
    }

    /* Contractor panel */
    .panel {
      max-width: 350px;
      background: #020617;
      border-radius: 20px;
      padding: 20px;
      text-align: left;
    }

    .lead {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      display: none;
    }

    .call-btn {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: #22c55e;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      color: white;
    }

  </style>
</head>

<body>

<h1>Live Demo</h1>
<p>See both sides of the system in action</p>

<div class="container">

  <!-- CUSTOMER PHONE -->
  <div class="phone">
    <div class="screen">

      <div class="header">Customer</div>

      <div class="messages" id="chat"></div>

      <div class="input-area">
        <input id="input" placeholder="Type message...">
        <button onclick="send()">Send</button>

        <div class="options" id="options">
          <button onclick="choose(1)">1. Emergency</button>
          <button onclick="choose(2)">2. Service Issue</button>
          <button onclick="choose(3)">3. Quote</button>
        </div>

      </div>
    </div>
  </div>

  <!-- CONTRACTOR PANEL -->
  <div class="panel">
    <h3>📲 New Lead Notification</h3>

    <p style="color:#22c55e; font-size:14px;">
⚡ This lead came from a missed call — without this system, it was lost.
</p>

    <div class="lead" id="leadBox">
      <strong>John Smith</strong><br>
      📞 (410) 555-1234<br><br>
      <span id="leadText"></span>

<a href="tel:14105551234" class="call-btn">📞 Call Customer</a>
<a href="sms:14105551234" class="call-btn">💬 Text Customer</a>
    </div>
  </div>

</div>

<script>
let step = 0;
let selected = "";

window.onload = () => {
  bot("📞 Incoming Call...");
  
  setTimeout(() => {
    bot("❌ Missed Call");
  }, 1200);

  setTimeout(() => {
    bot("Hey! Sorry we missed your call.\n\nWhat can we help you with?");
  }, 2200);
};

function bot(text){
  let m = document.createElement("div");
  m.className = "bubble bot";
  m.innerText = text;
  chat.appendChild(m);
}

function user(text){
  let m = document.createElement("div");
  m.className = "bubble user";
  m.innerText = text;
  chat.appendChild(m);
}

function choose(option){
  selected = option;
  user(option);
  document.getElementById("options").style.display = "none";

  if(option == 1){
    bot("Emergency — what’s happening?");
  } else if(option == 2){
    bot("Describe the issue:");
  } else {
    bot("What type of work do you need?");
  }

  step = 1;
}

function send(){
  let val = input.value;
  if(!val) return;

  user(val);
  input.value = "";

  if(step === 1){
    bot("Got it — sending to contractor now...");

    setTimeout(() => {
      document.getElementById("leadBox").style.display = "block";
      document.getElementById("leadText").innerText = val;

      bot("✅ Contractor notified. They will contact you shortly.");
    }, 800);
  }
}
</script>

</body>
</html>
