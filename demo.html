<!DOCTYPE html>
<html>
<head>
  <title>Missed Call Demo | Code 3 Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px 15px;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 25px;
    }

    .phone {
      width: 100%;
      max-width: 375px;
      margin: auto;
      background: black;
      border-radius: 40px;
      padding: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    .notch {
      width: 120px;
      height: 25px;
      background: #111;
      border-radius: 20px;
      margin: 0 auto 10px;
    }

    .screen {
      background: #f1f5f9;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 500px;
    }

    .header {
      background: white;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
      color: black;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      margin: 6px 0;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.4;
    }

    .bot {
      background: #e5e7eb;
      color: black;
      text-align: left;
    }

    .user {
      background: #2563eb;
      color: white;
      margin-left: auto;
    }

    .buttons {
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: none;
      border-radius: 12px;
      background: #e11d48;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #be123c;
    }
  </style>
</head>

<body>

  <h1>Test the System</h1>
  <p>Experience what your customers see after a missed call.</p>

  <div class="phone">
    <div class="notch"></div>

    <div class="screen">

      <div class="header">
        Code 3 Leads
      </div>

      <div class="messages" id="chat">

        <div class="bubble bot">
          Hey! Sorry we missed your call.<br><br>
          What can we help you with?<br><br>
          1. Emergency<br>
          2. Service Issue<br>
          3. Quote/Estimate
        </div>

      </div>

      <div class="buttons">
        <button onclick="reply(1)">1. Emergency</button>
        <button onclick="reply(2)">2. Service Issue</button>
        <button onclick="reply(3)">3. Quote / Estimate</button>
      </div>

    </div>
  </div>

  <script>
    function reply(option) {
      const chat = document.getElementById("chat");

      let user = document.createElement("div");
      user.className = "bubble user";
      user.innerText = option;
      chat.appendChild(user);

      let bot = document.createElement("div");
      bot.className = "bubble bot";

      if(option == 1){
        bot.innerText = "Got it — this looks urgent. We’re contacting a contractor now.";
      } else if(option == 2){
        bot.innerText = "Thanks! Please describe your issue and we’ll follow up shortly.";
      } else {
        bot.innerText = "Perfect — we’ll reach out with a quote ASAP.";
      }

      setTimeout(() => {
        chat.appendChild(bot);
        chat.scrollTop = chat.scrollHeight;
      }, 400);
    }
  </script>

</body>
</html>
